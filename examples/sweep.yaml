# This is an example config file that can be used to initiate a hyperparameter sweep
# using the Weights and Biases experiment tracking platform
# See: https://docs.wandb.ai/guides/sweeps
project: "SWEEP_DEEPRMSA_TRANSFORMER"
name: "DEEPRMSA_TRANSFORMER"
program: xlron/train/train.py
method: bayes
metric:
  name: service_blocking_probability_mean
  goal: minimize
early_terminate:
  type: hyperband
  min_iter: 10000000
  max_iter: 60000000
  s: 3
parameters:
  ADAM_BETA1:
    min: 0.8
    max: 0.99
  ADAM_BETA2:
    min: 0.9
    max: 0.999
  GAMMA:
    min: 0.99
    max: 0.9999
  GAE_LAMBDA:
    min: 0.99
    max: 0.999
  ROLLOUT_LENGTH:
    values:
      - 128
      - 256
  LR:
    min: 0.0001
    max: 0.001
  REWARD_SCALE:
    values:
      - 1
      - 10
  CLIP_EPS:
    values:
      - 0.02
      - 0.04
      - 0.08
      - 0.16
  VF_COEF:
    min: 0.1
    max: 1.0
  ENT_COEF:
    min: 0.001
    max: 0.1
  ENT_END_FRACTION:
    values:
      - 0.1
      - 0.2
      - 0.5
  OFF_POLICY_IAM:
    values:
      - true
      - false
  # PRIO_ALPHA:
  #   min: 0.0
  #   max: 1.0
  # PRIO_BETA0:
  #   min: 0.0
  #   max: 1.0
  # C_CLIP:
  #   min: 0.0
  #   max: 2.0
  # RHO_CLIP:
  #   min: 0.0
  #   max: 2.0
  transformer_num_layers:
    values:
      - 2
  transformer_num_heads:
    values:
      - 4
      - 8
  transformer_obs_type:
    values:
      - "departure"
      - "occupancy"
  transformer_embedding_size:
    values:
      - 64
      - 128
  transformer_actor_mlp_width:
    values:
      - 128
      - 256
  transformer_actor_mlp_depth:
    values:
      - 1
      - 2
  transformer_critic_mlp_width:
    values:
      - 128
      - 256
  transformer_critic_mlp_depth:
    values:
      - 2
  aggregate_slots:
    values:
      - 10
      - 20
      - 100
command:
  - "uv"
  - "run"
  - "python"
  - ${program}
  - "--env_type"
  - "rmsa"
  - "--load"
  - 200
  - "--k"
  - 50
  - "--topology_name"
  - "nsfnet_deeprmsa_directed"
  - "--link_resources"
  - 100
  - "--mean_service_holding_time"
  - 1
  - --continuous_operation
  - "--ENV_WARMUP_STEPS"
  - 3000
  - --REWARD_CENTERING
  - --USE_TRANSFORMER
  - --truncate_holding_time
  - "--TOTAL_TIMESTEPS"
  - 60000000
  - "--UPDATE_EPOCHS"
  - 1
  - "--NUM_ENVS"
  - 64
  - "--WANDB"
  - "--LOG_LOSS_INFO"
  - "--DOWNSAMPLE_FACTOR"
  - 100
  - ${args}
