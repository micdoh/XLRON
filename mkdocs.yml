site_name: "XLRON - Accelerated Learning and Resource Allocation for Optical Networks"
site_url: https://micdoh.github.io/XLRON/
theme:
  name: material
  logo: images/xlron_nobackground.png
  palette:
    accent: teal
    primary: teal
  features:
    - content.tabs.link
    - search.suggest
extra_css:
  - stylesheets/xlron.css
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
plugins:
  - search
  - mkdocstrings:
      enabled: true
      default_handler: python
      handlers:
        python:
          paths: []
          options:
            show_source: true
            show_root_heading: false
nav:
  - Home: "index.md"
  - "Why XLRON":
      - "Comparisons & Speed": "features/speed.md"
      - "Physical Layer Model": "features/physical_layer.md"
      - "Differentiable Simulation": "features/differentiable.md"
      - "Graph Transformer for RMSA": "features/transformer.md"
      - "Topologies": "features/topologies.md"
      - "Graphical User Interface": "features/gui.md"
  - Getting Started:
      - Installation: "installation.md"
      - Quick Start: "quickstart.md"
  - "User Guide":
      - Understanding XLRON: "understanding_xlron.md"
      - GN Model Physical Layer: "gn_model.md"
      - Differentiable DRA Pipeline: "differentiable_dra.md"
      - Training with PPO: "training.md"
      - Heuristic Evaluation: "heuristic_evaluation.md"
      - Capacity Bound Estimation: "capacity_bounds.md"
      - Command-line options: "flags_reference.md"
      - Function reference: "reference.md"
  - "Reproducing the Papers":
      - "Overview & papers": "papers.md"
      - "Hype or Hope? (JOCN 2025)": "reproduce_jocn2024.md"
      - "RWA-LR (ONDM 2025)": "reproduce_rwalr.md"
      - "Capacity bounds comparison (ECOC 2026 submitted)": "reproduce_ecoc2026.md"
      - "XLRON framework (in prep.)": "reproduce_jocn_xlron.md"
      - "Graph Transformer (in prep.)": "reproduce_jocn_transformer.md"
  - About:
      - "License and Support": "license.md"
not_in_nav: |
  /example_sweep_config.yml
